<!DOCTYPE html>
<html lang="vi">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FoodieMenu</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<!-- Navbar -->

<nav class="navbar navbar-expand-lg navbar-dark bg-danger shadow">

<div class="container">

<a class="navbar-brand fw-bold" href="#">
🍔 FoodieMenu
</a>

<input class="form-control w-50" id="search" type="text"
placeholder="🔍 Tìm món ăn...">

</div>

</nav>

<!-- Banner -->

<div class="banner text-center text-white">

<h1>🍕 THỰC ĐƠN NHÀ HÀNG</h1>

<p>Món ăn ngon - Giá hợp lý</p>

</div>

<div class="container mt-4">

<div class="text-center mb-4">

<button class="btn btn-warning filter"
data-category="all">Tất cả</button>

<button class="btn btn-success filter"
data-category="Burger">Burger</button>

<button class="btn btn-primary filter"
data-category="Pizza">Pizza</button>

<button class="btn btn-danger filter"
data-category="Steak">Steak</button>

</div>

<div class="row" id="menu">

<!-- Burger -->

<div class="col-md-4 food Burger">

<div class="card shadow">

<span class="badge bg-warning text-dark">Hot</span>

<img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600"
class="card-img-top">

<div class="card-body">

<h4>Burger Bò</h4>

<p>99.000đ</p>

<button class="btn btn-danger">
Đặt món
</button>

<button class="btn btn-outline-danger">
<i class="fa-solid fa-heart"></i>
</button>

</div>

</div>

</div>

<!-- Pizza -->

<div class="col-md-4 food Pizza">

<div class="card shadow">

<span class="badge bg-success">Best</span>

<img src="https://images.unsplash.com/photo-1513104890138-7c749659a591?w=600"
class="card-img-top">

<div class="card-body">

<h4>Pizza Hải Sản</h4>

<p>189.000đ</p>

<button class="btn btn-danger">
Đặt món
</button>

<button class="btn btn-outline-danger">
<i class="fa-solid fa-heart"></i>
</button>

</div>

</div>

</div>

<!-- Steak -->

<div class="col-md-4 food Steak">

<div class="card shadow">

<span class="badge bg-primary">VIP</span>

<img src="https://images.unsplash.com/photo-1544025162-d76694265947?w=600"
class="card-img-top">

<div class="card-body">

<h4>Beef Steak</h4>

<p>299.000đ</p>

<button class="btn btn-danger">
Đặt món
</button>

<button class="btn btn-outline-danger">
<i class="fa-solid fa-heart"></i>
</button>

</div>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
